<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Expert Pro v3</title>

    <style>
        :root {
            --bg-color: #000000; --card-bg: #111111; --primary: #2a2a2e;
            --active-bg: #4f5b7d; --text-color: #ffffff; --text-muted: #8e8e93;
            --border-color: #2c2c2e; --risk-color: #ff453a; --accent-blue: #38bdf8; --pink: #ff69b4;
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; font-size: 14px; padding-bottom: 80px; -webkit-user-select: none; }
        
        #splash { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .card { background-color: var(--card-bg); border-radius: 12px; margin: 10px; padding: 15px; border: 1px solid var(--border-color); }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--accent-blue); padding-left: 10px; }

        .item-group { margin-bottom: 15px; }
        .item-label { color: var(--text-color); font-size: 13px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .current-val { color: var(--accent-blue); font-weight: bold; }

        .segment-control { display: flex; background-color: var(--primary); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        .segment-btn { flex: 1; padding: 12px 0; background: none; border: none; color: var(--text-color); font-weight: bold; font-size: 13px; text-align: center; border-right: 1px solid var(--border-color); }
        .segment-btn:last-child { border-right: none; }
        .segment-btn.active { background-color: var(--active-bg); color: var(--accent-blue); }

        .switch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--primary); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        input.text-input, select.brand-select { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 12px; border-radius: 10px; width: calc(100% - 26px); font-size: 14px; margin: 10px; }
        .auto-btn { width: calc(100% - 20px); margin: 10px; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; background-color: var(--active-bg); color: white; }

        /* 結果テーブル */
        .res-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .res-table td { padding: 10px 0; border-bottom: 1px solid #222; }
        .badge-pink { background: var(--pink); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 5px; }

        .tabbar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background-color: #050505; padding: 15px 0; border-top: 1px solid var(--border-color); }
        .tab-btn { background: none; color: var(--text-muted); border: none; font-size: 14px; }
        .tab-btn.active { color: var(--accent-blue); font-weight: bold; }
        #video { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; background: #222; }
    </style>
</head>
<body>

<div id="splash"><h1>縮毛矯正ナビAI</h1><p>Expert Pro v3</p></div>

<div id="app">
    <div id="screen-diagnosis">
        <input id="cust-name" class="text-input" placeholder="お客様名（任意）">
        <select id="brand-select" class="brand-select">
            <option value="milbon">ミルボン (ネオリシオ)</option>
            <option value="arimino">アリミノ (クオライン)</option>
        </select>

        <div class="card">
            <div class="section-title">本来の毛髪強度</div>
            <div class="item-group">
                <div class="item-label">髪の太さ (1~10) <span class="current-val" id="v-thick">5</span></div>
                <div class="segment-control" data-key="thick">
                    <script> [2,4,5,6,8,10].forEach(n=>document.write(`<button class="segment-btn ${n==5?'active':''}" onclick="upd('thick',${n},this)">${n}</button>`)) </script>
                </div>
            </div>
            <div class="item-group">
                <div class="item-label">弾力 (0~5) <span class="current-val" id="v-elastic">3</span></div>
                <div class="segment-control" data-key="elastic">
                    <script> [1,2,3,4,5].forEach(n=>document.write(`<button class="segment-btn ${n==3?'active':''}" onclick="upd('elastic',${n},this)">${n}</button>`)) </script>
                </div>
            </div>
            <div class="item-group">
                <div class="item-label">疎水性 (0~5) <span class="current-val" id="v-porous">3</span></div>
                <div class="segment-control" data-key="porous">
                    <script> [0,1,2,3,4,5].forEach(n=>document.write(`<button class="segment-btn ${n==3?'active':''}" onclick="upd('porous',${n},this)">${n}</button>`)) </script>
                </div>
            </div>
            <div class="item-group">
                <div class="item-label">毛量 <span class="current-val" id="v-vol">普通</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="updVol('超少ない',0.5,this)">超少ない</button>
                    <button class="segment-btn" onclick="updVol('少ない',0.8,this)">少ない</button>
                    <button class="segment-btn active" onclick="updVol('普通',1.0,this)">普通</button>
                    <button class="segment-btn" onclick="updVol('多い',1.2,this)">多い</button>
                    <button class="segment-btn" onclick="updVol('超多い',1.5,this)">超多い</button>
                </div>
            </div>
            <div class="switch-row"><span>黒人毛 (+10)</span><label class="switch"><input type="checkbox" id="isBlack"><span class="slider"></span></label></div>
        </div>

        <div class="card">
            <div class="switch-row"><div class="section-title" style="margin:0;">根元</div><div style="font-size:12px; color:var(--text-muted);">リタッチのみ <label class="switch"><input type="checkbox" id="isRetouch" onchange="toggleTip()"><span class="slider"></span></label></div></div>
            <div class="item-group">
                <div class="item-label">ダメージ (0~20) <span class="current-val" id="v-rDmg">0</span></div>
                <div class="segment-control"><script> [0,5,10,15,20].forEach(n=>document.write(`<button class="segment-btn ${n==0?'active':''}" onclick="upd('rDmg',${n},this)">${n}</button>`)) </script></div>
            </div>
            <div class="item-group">
                <div class="item-label">根元のリッジ</div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="upd('rRidge','weak',this)">弱い</button>
                    <button class="segment-btn active" onclick="upd('rRidge','normal',this)">普通</button>
                    <button class="segment-btn" onclick="upd('rRidge','strong',this)">強い</button>
                    <button class="segment-btn" onclick="upd('rRidge','difficult',this)">難しい</button>
                </div>
            </div>
        </div>

        <div class="card" id="tip-card">
            <div class="section-title">毛先</div>
            <div class="item-group">
                <div class="item-label">ダメージ (0~20) <span class="current-val" id="v-tDmg">0</span></div>
                <div class="segment-control"><script> [0,5,10,15,20].forEach(n=>document.write(`<button class="segment-btn ${n==0?'active':''}" onclick="upd('tDmg',${n},this)">${n}</button>`)) </script></div>
            </div>
            <div class="item-group">
                <div class="item-label">毛先のリッジ</div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="upd('tRidge','weak',this)">弱い</button>
                    <button class="segment-btn active" onclick="upd('tRidge','normal',this)">普通</button>
                    <button class="segment-btn" onclick="upd('tRidge','strong',this)">強い</button>
                    <button class="segment-btn" onclick="upd('tRidge','difficult',this)">難しい</button>
                </div>
            </div>
        </div>

        <button class="auto-btn" onclick="runCalc()">計算する</button>

        <div id="res-area" style="display:none; margin-bottom:100px;">
            <div class="card">
                <div class="section-title">診断結果</div>
                <table class="res-table" id="res-table-body"></table>
            </div>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab-btn active">診断</button>
        <button class="tab-btn">カルテ</button>
    </div>
</div>

<script>
    let state = { thick:5, elastic:3, porous:3, volLabel:'普通', volMul:1.0, rDmg:0, rRidge:'normal', tDmg:0, tRidge:'normal' };

    function upd(k, v, el) {
        el.parentNode.querySelectorAll('.segment-btn').forEach(b=>b.classList.remove('active'));
        el.classList.add('active');
        state[k] = v;
        if(document.getElementById('v-'+k)) document.getElementById('v-'+k).innerText = v;
    }

    function updVol(l, m, el) {
        el.parentNode.querySelectorAll('.segment-btn').forEach(b=>b.classList.remove('active'));
        el.classList.add('active');
        state.volLabel = l; state.volMul = m;
        document.getElementById('v-vol').innerText = l;
    }

    function toggleTip() { document.getElementById('tip-card').style.opacity = document.getElementById('isRetouch').checked ? "0.3" : "1"; }

    function getGmt(ridge) {
        if(ridge==='weak') return {h:'H10%', t:'30分'};
        if(ridge==='normal') return {h:'H15%', t:'30分'};
        if(ridge==='strong') return {h:'H20%', t:'35分'};
        return {h:'H25%', t:'35分'};
    }

    function getDrug(score) {
        if(score>=15) return {d:'AX7:BX3', i:'0.5s / 7mm'};
        if(score>=10) return {d:'AX5:BX5', i:'0.8s / 5mm'};
        if(score>=5)  return {d:'AX3:BX7', i:'1.0s / 4mm'};
        return {d:'BX単体', i:'1.5s / 3mm'};
    }

    function runCalc() {
        let base = state.thick + state.elastic + state.porous + (document.getElementById('isBlack').checked ? 10 : 0);
        let resH = `<tr><td>本来の毛髪強度</td><td style="text-align:right">Score: <strong>${base}</strong></td></tr>`;
        
        // 根元
        let rS = base - state.rDmg;
        let rD = getDrug(rS); let rG = getGmt(state.rRidge);
        let total = Math.round(60 * state.volMul);
        resH += `<tr><td colspan="2" style="color:var(--accent-blue); padding-top:15px;"><b>【根元】</b></td></tr>
                 <tr><td>推奨薬剤</td><td style="text-align:right">${rD.d}<span class="badge-pink">${rG.h}</span></td></tr>
                 <tr><td>配合量目安</td><td style="text-align:right">総量約 ${total}g</td></tr>
                 <tr><td>放置 / アイロン</td><td style="text-align:right">${rG.t} / ${rD.i}</td></tr>`;

        // 毛先
        if(!document.getElementById('isRetouch').checked) {
            let tS = base - state.tDmg;
            let tD = getDrug(tS); let tG = getGmt(state.tRidge);
            resH += `<tr><td colspan="2" style="color:var(--pink); padding-top:15px;"><b>【毛先】</b></td></tr>
                     <tr><td>推奨薬剤</td><td style="text-align:right">${tD.d}<span class="badge-pink">${tG.h}</span></td></tr>
                     <tr><td>放置 / アイロン</td><td style="text-align:right">${tG.t} / ${tD.i}</td></tr>`;
        }

        document.getElementById('res-table-body').innerHTML = resH;
        document.getElementById('res-area').style.display = 'block';
        setTimeout(() => window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'}), 100);
    }

    setTimeout(() => document.getElementById('splash').style.display='none', 1000);
</script>
</body>
</html>
