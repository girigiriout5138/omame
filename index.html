<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Expert Pro</title>

    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --primary: #2a2a2e; /* 見本のボタン色に近いグレー */
            --active-bg: #4f5b7d; /* 見本の選択時の青みがかったグレー */
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
            --risk-color: #ff453a;
            --success-color: #30d158;
            --accent-blue: #38bdf8;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            padding-bottom: 80px; /* タブバー用 */
            -webkit-user-select: none; user-select: none;
        }

        /* スプラッシュ画面 */
        #splash {
            position: fixed; inset: 0;
            background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }

        /* 共通スタイル */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            margin: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px; font-weight: bold;
            margin-bottom: 15px;
        }

        .item-group { margin-bottom: 15px; }
        .item-label {
            color: var(--text-color); font-size: 14px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 5px;
        }
        .info-icon {
            color: #38bdf8; font-size: 14px; margin-left: 5px; cursor: pointer;
        }
        .current-val { color: var(--accent-blue); font-weight: bold; font-size: 14px; }

        /* セグメントコントロール（見本の四角いボタン） */
        .segment-control {
            display: flex;
            background-color: var(--primary);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .segment-btn {
            flex: 1;
            padding: 12px 0;
            background: none; border: none;
            color: var(--text-color); font-weight: bold; font-size: 14px;
            text-align: center; cursor: pointer;
            border-right: 1px solid var(--border-color);
        }
        .segment-btn:last-child { border-right: none; }
        .segment-btn.active {
            background-color: var(--active-bg);
        }

        /* スイッチスイッチ（見本と同じ） */
        .switch {
            position: relative; display: inline-block;
            width: 44px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--primary);
            transition: .4s; border-radius: 24px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 入力エリア */
        input.text-input, select.brand-select {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px; border-radius: 10px;
            width: calc(100% - 26px);
            font-size: 14px; margin: 10px;
        }

        /* アクションボタン */
        .auto-btn {
            width: calc(100% - 20px); margin: 10px; padding: 15px;
            border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* 計算結果出力 */
        .mix-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; }
        .risk-box { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--risk-color); color: #fca5a5; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 12px; }

        /* タブバー */
        .tabbar {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around;
            background-color: #050505;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .tab-btn { background: none; color: var(--text-muted); border: none; font-size: 14px; }
        .tab-btn.active { color: #38bdf8; font-weight: bold; }

        /* カメラ */
        #video { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px;}
        #photo-preview img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--active-bg); }

    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffffff; font-size:24px;">縮毛矯正ナビAI</h1>
    <p style="color:#64748b; font-size:12px;">Expert Pro Edition</p>
</div>

<div id="app">
    <div id="screen-diagnosis" class="screen active">
        <input id="cust-name" class="text-input" placeholder="お客様名（任意）">
        
        <select id="brand-select" class="brand-select" onchange="state.brand = this.value">
            <option value="milbon">ミルボン (ネオリシオ)</option>
            <option value="arimino">アリミノ (クオライン)</option>
            <option value="custom">標準カスタム比率</option>
        </select>

        <div class="card">
            <div class="section-title">本来の毛髪強度</div>

            <div class="item-group">
                <div class="item-label">髪の太さ (1~10) <span class="info-icon">i</span> <span class="current-val" id="val-thick">5</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="updateSegment('thick', 2, this)">2</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 4, this)">4</button>
                    <button class="segment-btn active" onclick="updateSegment('thick', 5, this)">5</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 6, this)">6</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 8, this)">8</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 10, this)">10</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">弾力 (0~5) <span class="info-icon">i</span> <span class="current-val" id="val-elastic">3</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="updateSegment('elastic', 1, this)">1</button>
                    <button class="segment-btn" onclick="updateSegment('elastic', 2, this)">2</button>
                    <button class="segment-btn active" onclick="updateSegment('elastic', 3, this)">3</button>
                    <button class="segment-btn" onclick="updateSegment('elastic', 4, this)">4</button>
                    <button class="segment-btn" onclick="updateSegment('elastic', 5, this)">5</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">疎水性 (0~5) <span class="info-icon">i</span> <span class="current-val" id="val-porous">3</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="updateSegment('porous', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 1, this)">1</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 2, this)">2</button>
                    <button class="segment-btn active" onclick="updateSegment('porous', 3, this)">3</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 4, this)">4</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 5, this)">5</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">毛量 <span class="current-val" id="val-vol">普通</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="updateVolume('超少ない', 0.5, this)">超少ない</button>
                    <button class="segment-btn" onclick="updateVolume('少ない', 0.8, this)">少ない</button>
                    <button class="segment-btn active" onclick="updateVolume('普通', 1.0, this)">普通</button>
                    <button class="segment-btn" onclick="updateVolume('多い', 1.2, this)">多い</button>
                    <button class="segment-btn" onclick="updateVolume('超多い', 1.5, this)">超多い</button>
                </div>
            </div>

            <div class="switch-row">
                <span>黒人毛 (+10)</span>
                <label class="switch">
                    <input type="checkbox" onchange="state.isBlack = this.checked">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div class="section-title" style="margin:0;">根元診断</div>
                <div style="font-size:12px; color:var(--text-muted);">
                    リタッチのみ 
                    <label class="switch">
                        <input type="checkbox" onchange="state.root.isRetouch = this.checked; toggleTipVisibility()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">カラーのダメージ (0~20) <span class="current-val" id="val-rootColor">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="updateSegment('rootColor', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 5, this)">5</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 15, this)">15</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">矯正のダメージ (0~20) <span class="current-val" id="val-rootPerm">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="updateSegment('rootPerm', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('rootPerm', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('rootPerm', 20, this)">20</button>
                </div>
            </div>
        </div>

        <div class="card" id="tip-diagnosis-card">
            <div class="section-title">毛先診断</div>

            <div class="item-group">
                <div class="item-label">カラーのダメージ (0~20) <span class="current-val" id="val-tipColor">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="updateSegment('tipColor', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 5, this)">5</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 15, this)">15</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">矯正のダメージ (0~20) <span class="current-val" id="val-tipPerm">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="updateSegment('tipPerm', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('tipPerm', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('tipPerm', 20, this)">20</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">AI 画像接写診断</div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="photo-preview"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleCamera()" style="flex:1; background-color:var(--primary); color:white; border:none; padding:10px; border-radius:8px;">カメラ起動</button>
                <button onclick="takePhoto()" style="flex:1; background-color:var(--active-bg); color:white; border:none; padding:10px; border-radius:8px;">写真を保存</button>
            </div>
        </div>

        <button class="auto-btn" style="background-color:var(--active-bg); color:white;" onclick="generatePlan()">計算する</button>

        <div id="plan-output"></div>

    </div>

    <div id="screen-record" class="screen">
        <div class="card">
            <div class="section-title">カルテ履歴</div>
            <p style="color:var(--text-muted)">履歴はありません</p>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab-btn active" onclick="switchTab('diagnosis', this)">診断</button>
        <button class="tab-btn" onclick="switchTab('record', this)">カルテ</button>
    </div>

</div>

<script>
// --- 状態管理 ---
let state = {
    thick: 5, elastic: 3, porous: 3, vol: '普通', volMultiplier: 1.0, isBlack: false,
    brand: 'milbon', capturedPhoto: null,
    root: { color: 0, perm: 0, isRetouch: false },
    tip: { color: 0, perm: 0 },
};

// 薬剤プリセット (1剤:水:油)
const brandPresets = {
    milbon:  { AX:[90,5,5], SH:[80,10,10], H:[70,20,10], M:[50,40,10], L:[30,60,10], B:[10,80,10] },
    arimino: { AX:[100,0,0], SH:[85,10,5],  H:[70,20,10], M:[50,40,10], L:[25,65,10], B:[5,85,10] },
    custom:  { AX:[80,10,10], SH:[70,15,15], H:[60,20,20], M:[50,30,20], L:[40,40,20], B:[30,50,20] }
};

// --- UI操作関数 ---
function updateSegment(key, val, el) {
    el.parentNode.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('val-'+key).innerText = val;
    if (key.startsWith('root')) state.root[key.replace('root', '').toLowerCase()] = val;
    else if (key.startsWith('tip')) state.tip[key.replace('tip', '').toLowerCase()] = val;
    else state[key] = val;
}

// 毛量の更新ロジックを修正
function updateVolume(label, multiplier, el) {
    el.parentNode.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('val-vol').innerText = label;
    state.volMultiplier = multiplier;
}

function calculatePlanFor(sec) {
    let score = state.thick + state.elastic + state.porous;
    if (state.isBlack) score += 10;
    score -= (sec.color + sec.perm);

    let lv = 'B';
    if(score >= 18) lv = 'AX';
    else if(score >= 15) lv = 'SH';
    else if(score >= 12) lv = 'H';
    else if(score >= 9)  lv = 'M';
    else if(score >= 6)  lv = 'L';

    const formula = brandPresets[state.brand][lv];
    const total = Math.round(60 * state.volMultiplier); // 毛量に応じて総量を増減（60gベース）
    return { lv, score, m: Math.round(total * formula[0]/100), w: Math.round(total * formula[1]/100), o: Math.round(total * formula[2]/100) };
}

function generatePlan() {
    const r = calculatePlanFor(state.root);
    const t = state.root.isRetouch ? null : calculatePlanFor(state.tip);
    const name = document.getElementById('cust-name').value || '未設定';

    let h = `
        <div class="card" style="border-left: 5px solid var(--accent-blue);">
            <div class="section-title">${name} 様 推奨配合：根元 (${r.lv})</div>
            <div class="mix-grid"><div>1剤<br><strong>${r.m}g</strong></div><div>減力水<br><strong>${r.w}g</strong></div><div>保護油<br><strong>${r.o}g</strong></div></div>
        </div>
    `;

    if (t) {
        h += `
            <div class="card" style="border-left: 5px solid #fbbf24;">
                <div class="section-title">${name} 様 推奨配合：毛先 (${t.lv})</div>
                <div class="mix-grid"><div>1剤<br><strong>${t.m}g</strong></div><div>減力水<br><strong>${t.w}g</strong></div><div>保護油<br><strong>${t.o}g</strong></div></div>
            </div>
        `;
    }

    if (state.tip.perm >= 20) h += `<div class="card risk-box">⚠️ 毛先の既往ダメージが深刻です。酸性域または処理剤を徹底してください。</div>`;
    document.getElementById('plan-output').innerHTML = h;
    window.scrollTo(0, document.body.scrollHeight); // 一番下へスクロール
}

// ユーティリティ
function toggleTipVisibility() {
    document.getElementById('tip-diagnosis-card').style.opacity = state.root.isRetouch ? "0.3" : "1";
    document.getElementById('tip-diagnosis-card').style.pointerEvents = state.root.isRetouch ? "none" : "auto";
}

function switchTab(sId, b) {
    document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('screen-diagnosis').style.display = (sId === 'diagnosis') ? 'block' : 'none';
    document.getElementById('screen-record').style.display = (sId === 'record') ? 'block' : 'none';
}

// カメラ (簡易)
let stream = null;
async function toggleCamera() {
    const v = document.getElementById('video');
    if (!stream) {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = stream; v.style.display = 'block';
    } else {
        stream.getTracks().forEach(t => t.stop());
        stream = null; v.style.display = 'none';
    }
}
function takePhoto() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    document.getElementById('photo-preview').innerHTML = `<img src="${c.toDataURL('image/png')}">`;
}
setTimeout(() => document.getElementById('splash').style.display='none', 1500);
</script>

</body>
</html>
