<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Master Pro v2</title>
    <style>
        :root {
            --bg: #000; --card: #111; --accent: #38bdf8; --btn: #2a2a2e; --active: #4f5b7d;
            --pink: #ff69b4; --text: #fff; --sub-text: #888; --border: #222;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 10px; padding-bottom: 60px; -webkit-user-select: none; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .val-badge { color: var(--accent); font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .num-btn { background: var(--btn); border: none; border-radius: 8px; color: #fff; padding: 12px 0; font-weight: bold; font-size: 14px; }
        .num-btn.active { background: var(--active); border: 1px solid var(--accent); }

        .chip-group { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .chip-btn { background: var(--btn); border: 1px solid var(--border); border-radius: 20px; color: #fff; padding: 8px 12px; font-size: 12px; cursor: pointer; }
        .chip-btn.active { background: var(--active); color: var(--accent); border-color: var(--accent); }

        .switch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
        input[type="checkbox"] { width: 40px; height: 20px; accent-color: var(--accent); }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .calc-btn { background: var(--active); color: white; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; }
        .reset-btn { background: var(--btn); color: var(--sub-text); padding: 16px; border-radius: 12px; border: none; }

        .res-table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 14px; }
        .res-table td { padding: 12px 0; border-bottom: 1px solid #222; }
        .res-label { color: var(--sub-text); }
        .res-val { text-align: right; font-weight: bold; }
        .badge-pink { background: var(--pink); color: #fff; padding: 2px 8px; border-radius: 5px; font-size: 12px; margin-left: 8px; }
    </style>
</head>
<body>

<div style="padding: 10px 0; font-weight: bold; color: var(--accent);">診断入力</div>

<div class="card">
    <div class="section-title">本来の毛髪強度</div>
    <div class="label-row">髪の太さ (1〜10) <span class="val-badge" id="v-thick">5</span></div>
    <div class="btn-grid"><script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==5?'active':''}" onclick="upd('thick',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">弾力 (0〜5) <span class="val-badge" id="v-elastic">3</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="upd('elastic',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">疎水性 (0〜5) <span class="val-badge" id="v-porous">3</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="upd('porous',${i},this)">${i}</button>`)</script></div>
    <div class="switch-row"><span>黒人毛 (+10)</span><input type="checkbox" id="isBlack"></div>
</div>

<div class="card">
    <div class="section-title">根元 <span style="font-size:10px; font-weight:normal;">リタッチのみ <input type="checkbox" id="isRetouch" onchange="toggleTip()"></span></div>
    <div class="label-row">カラーのダメージ (0〜20) <span class="val-badge" id="v-rDmg">0</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="upd('rDmg',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">不安要素 (0〜10) <span class="val-badge" id="v-rUnrest">0</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=10; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="upd('rUnrest',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">根元のリッジ</div>
    <div class="chip-group">
        <button class="chip-btn" onclick="upd('rRidge','weak',this)">弱い</button>
        <button class="chip-btn active" onclick="upd('rRidge','normal',this)">普通</button>
        <button class="chip-btn" onclick="upd('rRidge','strong',this)">強い</button>
        <button class="chip-btn" onclick="upd('rRidge','difficult',this)">難しい</button>
    </div>
</div>

<div id="tip-card" class="card">
    <div class="section-title">毛先</div>
    <div class="label-row">カラーのダメージ (0〜20) <span class="val-badge" id="v-tDmg">0</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="upd('tDmg',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">不安要素 (0〜10) <span class="val-badge" id="v-tUnrest">0</span></div>
    <div class="btn-grid"><script>for(let i=0; i<=10; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="upd('tUnrest',${i},this)">${i}</button>`)</script></div>
    <div class="label-row">毛先のリッジ</div>
    <div class="chip-group">
        <button class="chip-btn" onclick="upd('tRidge','weak',this)">弱い</button>
        <button class="chip-btn active" onclick="upd('tRidge','normal',this)">普通</button>
        <button class="chip-btn" onclick="upd('tRidge','strong',this)">強い</button>
        <button class="chip-btn" onclick="upd('tRidge','difficult',this)">難しい</button>
    </div>
</div>

<div class="action-row">
    <button class="calc-btn" onclick="runCalc()">計算する</button>
    <button class="reset-btn" onclick="location.reload()">↺ リセット</button>
</div>

<div id="res-area" style="display:none; margin-top:20px;">
    <div class="card">
        <div class="section-title">診断結果</div>
        <table class="res-table">
            <tr><td class="res-label">本来の毛髪強度</td><td class="res-val" id="out-base-text">- <span class="val-badge" id="out-base-num"></span></td></tr>
            
            <tr><td colspan="2" style="padding-top:15px; color:var(--accent); font-weight:bold;">【根元】</td></tr>
            <tr><td class="res-label">推奨薬剤</td><td class="res-val"><span id="out-drug-r">-</span><span class="badge-pink" id="out-h-r">-</span></td></tr>
            <tr><td class="res-label">放置時間</td><td class="res-val" id="out-time-r">-</td></tr>
            <tr><td class="res-label">アイロン/スライス</td><td class="res-val" id="out-info-r">-</td></tr>
            
            <tbody id="tip-res-body">
                <tr><td colspan="2" style="padding-top:15px; color:var(--pink); font-weight:bold;">【毛先】</td></tr>
                <tr><td class="res-label">推奨薬剤</td><td class="res-val"><span id="out-drug-t">-</span><span class="badge-pink" id="out-h-t">-</span></td></tr>
                <tr><td class="res-label">放置時間</td><td class="res-val" id="out-time-t">-</td></tr>
                <tr><td class="res-label">アイロン/スライス</td><td class="res-val" id="out-info-t">-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let state = { thick:5, elastic:3, porous:3, rDmg:0, rUnrest:0, rRidge:'normal', tDmg:0, tUnrest:0, tRidge:'normal' };

    function upd(key, val, el) {
        el.parentNode.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        state[key] = val;
        if(document.getElementById('v-'+key)) document.getElementById('v-'+key).innerText = val;
    }

    function toggleTip() {
        document.getElementById('tip-card').style.opacity = document.getElementById('isRetouch').checked ? "0.3" : "1";
    }

    // リッジに基づくGMT濃度と時間を判定する関数
    function getGmtSelection(ridgeValue) {
        switch (ridgeValue) {
            case 'weak': return { gmt: 'H10%', time: '30分' };
            case 'normal': return { gmt: 'H15%', time: '30分' };
            case 'strong': return { gmt: 'H20%', time: '35分' };
            case 'difficult': return { gmt: 'H25%', time: '35分' };
            default: return { gmt: '-', time: '-' };
        }
    }

    function getBaseDrug(score) {
        if (score >= 15) return { d:"AX9:BX1", i:"0.40秒 / 8mm" };
        if (score >= 11) return { d:"AX7:BX3", i:"0.50秒 / 7mm" };
        if (score >= 8)  return { d:"AX5:BX5", i:"0.80秒 / 5mm" };
        if (score >= 5)  return { d:"AX3:BX7", i:"1.00秒 / 4mm" };
        return { d:"BX単体", i:"1.50秒以上 / 3mm" };
    }

    function runCalc() {
        let base = state.thick + state.elastic + state.porous;
        if(document.getElementById('isBlack').checked) base += 10;
        document.getElementById('out-base-text').innerHTML = `太${state.thick}、弾${state.elastic}、疎${state.porous} <span class="val-badge" style="margin-left:10px;">${base}</span>`;

        // 根元の計算
        let rScore = base - state.rDmg - state.rUnrest;
        let rBase = getBaseDrug(rScore);
        let rGmt = getGmtSelection(state.rRidge);
        document.getElementById('out-drug-r').innerText = rBase.d;
        document.getElementById('out-h-r').innerText = rGmt.gmt;
        document.getElementById('out-time-r').innerText = rGmt.time;
        document.getElementById('out-info-r').innerText = rBase.i;

        // 毛先の計算
        if(!document.getElementById('isRetouch').checked) {
            let tScore = base - state.tDmg - state.tUnrest;
            let tBase = getBaseDrug(tScore);
            let tGmt = getGmtSelection(state.tRidge);
            document.getElementById('out-drug-t').innerText = tBase.d;
            document.getElementById('out-h-t').innerText = tGmt.gmt;
            document.getElementById('out-time-t').innerText = tGmt.time;
            document.getElementById('out-info-t').innerText = tBase.i;
            document.getElementById('tip-res-body').style.display = "table-row-group";
        } else {
            document.getElementById('tip-res-body').style.display = "none";
        }

        document.getElementById('res-area').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
