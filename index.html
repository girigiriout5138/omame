<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縮毛矯正ナビAI Pro</title>

<style>
body { background:#000; color:#fff; font-family:-apple-system; margin:0; padding-bottom:80px;}
.card { background:#111; margin:10px; padding:15px; border-radius:10px; }
.section-title { font-weight:bold; margin-bottom:10px;}
.segment-btn { flex:1; padding:10px; background:#222; border:none; color:#fff;}
.segment-btn.active { background:#4f5b7d;}
.segment-control { display:flex; }
.auto-btn { width:90%; margin:10px; padding:15px; background:#4f5b7d; border:none; color:#fff;}
.mix-grid { display:grid; grid-template-columns:1fr 1fr 1fr; text-align:center;}
.tabbar { position:fixed; bottom:0; width:100%; display:flex; background:#000;}
.tab-btn { flex:1; padding:15px; color:#888; background:none; border:none;}
.tab-btn.active { color:#38bdf8;}
.switch { position:relative; display:inline-block; width:44px; height:24px;}
.switch input {display:none;}
.slider {position:absolute; inset:0; background:#333; border-radius:24px;}
.slider:before {content:""; position:absolute; width:20px; height:20px; background:#fff; top:2px; left:2px; border-radius:50%;}
input:checked + .slider {background:#38bdf8;}
input:checked + .slider:before {transform:translateX(20px);}
.risk-box { background:#330000; padding:10px; margin:10px; border-radius:8px;}
#plan-output { position:sticky; bottom:90px;}
</style>
</head>

<body>

<div id="screen-diagnosis">
<input id="cust-name" placeholder="名前" style="width:90%; margin:10px; padding:10px;">

<div class="card">
<div class="section-title">基本診断</div>

<div>太さ <span id="val-thick">5</span></div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateSegment('thick',5,this)">5</button>
<button class="segment-btn" onclick="updateSegment('thick',8,this)">8</button>
</div>

<div>弾力 <span id="val-elastic">3</span></div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateSegment('elastic',3,this)">3</button>
<button class="segment-btn" onclick="updateSegment('elastic',5,this)">5</button>
</div>

<div>疎水 <span id="val-porous">3</span></div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateSegment('porous',3,this)">3</button>
<button class="segment-btn" onclick="updateSegment('porous',5,this)">5</button>
</div>

<div>毛量</div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateVolume(1,this)">普通</button>
<button class="segment-btn" onclick="updateVolume(1.5,this)">多い</button>
</div>

<div>黒人毛 <label class="switch"><input type="checkbox" onchange="state.isBlack=this.checked"><span class="slider"></span></label></div>
<div>ブリーチ履歴 <label class="switch"><input type="checkbox" onchange="state.isBleach=this.checked"><span class="slider"></span></label></div>
<div>酸性モード <label class="switch"><input type="checkbox" onchange="state.isAcid=this.checked"><span class="slider"></span></label></div>

</div>

<div class="card">
<div class="section-title">ダメージ</div>

<div>カラー <span id="val-rootColor">0</span></div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateSegment('rootColor',0,this)">0</button>
<button class="segment-btn" onclick="updateSegment('rootColor',10,this)">10</button>
</div>

<div>縮毛 <span id="val-rootPerm">0</span></div>
<div class="segment-control">
<button class="segment-btn active" onclick="updateSegment('rootPerm',0,this)">0</button>
<button class="segment-btn" onclick="updateSegment('rootPerm',20,this)">20</button>
</div>

</div>

<button class="auto-btn" onclick="generatePlan()">計算</button>
<div id="plan-output"></div>
</div>

<div id="screen-record" style="display:none;">
<div class="card">
<div class="section-title">履歴</div>
<div id="record-list"></div>
</div>
</div>

<div class="tabbar">
<button class="tab-btn active" onclick="switchTab('diagnosis',this)">診断</button>
<button class="tab-btn" onclick="switchTab('record',this)">カルテ</button>
</div>

<script>

// 状態
let state={
thick:5, elastic:3, porous:3,
volMultiplier:1,
isBlack:false, isBleach:false, isAcid:false,
root:{color:0,perm:0}
};

// UI
function updateSegment(key,val,el){
el.parentNode.querySelectorAll('.segment-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
document.getElementById('val-'+key).innerText=val;

if(key==='rootColor') state.root.color=val;
else if(key==='rootPerm') state.root.perm=val;
else state[key]=val;
}

function updateVolume(mult,el){
el.parentNode.querySelectorAll('.segment-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
state.volMultiplier=mult;
}

// 計算
function calcScore(){
let base=(state.thick*1.2)+(state.elastic*1.5)+(state.porous*1.3);
let damage=(state.root.color*0.8)+(state.root.perm*1.2);
let score=base-damage;

if(state.isBlack) score+=6;
if(state.isBleach) score-=5;
if(state.isAcid) score+=3;

return score;
}

function getLevel(score){
if(score>=18) return 'AX';
if(score>=15) return 'SH';
if(score>=12) return 'H';
if(score>=9) return 'M';
if(score>=6) return 'L';
return 'B';
}

// 実行
function generatePlan(){
let score=calcScore();
score+=Math.random()*0.5;
let lv=getLevel(score);

let total=60*state.volMultiplier;

let m=Math.round(total*0.7);
let w=Math.round(total*0.2);
let o=Math.round(total*0.1);

let warnings=[];
if(score<5) warnings.push("⚠️ ハイダメージ");
if(state.root.perm>=15) warnings.push("⚠️ 縮毛履歴強");
if(state.porous>=4) warnings.push("⚠️ 高多孔");

let name=document.getElementById('cust-name').value||"未設定";

let h=`
<div class="card">
<div>${name} (${lv})</div>
<div class="mix-grid">
<div>1剤 ${m}g</div>
<div>水 ${w}g</div>
<div>油 ${o}g</div>
</div>
</div>
`;

warnings.forEach(w=>{
h+=`<div class="risk-box">${w}</div>`;
});

document.getElementById('plan-output').innerHTML=h;

saveRecord({name,date:new Date(),lv});
if(navigator.vibrate) navigator.vibrate(10);
}

// 保存
function saveRecord(data){
let r=JSON.parse(localStorage.getItem('records')||'[]');
r.push(data);
localStorage.setItem('records',JSON.stringify(r));
}

// 履歴
function loadRecords(){
let records=JSON.parse(localStorage.getItem('records')||'[]');
let c=document.getElementById('record-list');

if(records.length===0){
c.innerHTML="履歴なし";return;
}

c.innerHTML=records.map((r,i)=>`
<div class="card" onclick="selectRecord(${i})">
<div>${r.name}</div>
<div>${new Date(r.date).toLocaleString()}</div>
<div>${r.lv}</div>
</div>
`).join('');
}

function selectRecord(i){
let r=JSON.parse(localStorage.getItem('records'))[i];

document.getElementById('record-list').innerHTML=`
<div class="card">
<div>${r.name}</div>
<div>${r.lv}</div>
</div>
<button onclick="loadRecords()">戻る</button>
`;
}

// タブ
function switchTab(id,btn){
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.getElementById('screen-diagnosis').style.display=id==='diagnosis'?'block':'none';
document.getElementById('screen-record').style.display=id==='record'?'block':'none';

if(id==='record') loadRecords();
}

</script>

</body>
</html>
