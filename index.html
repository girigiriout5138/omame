<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Pro</title>

    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --primary: #333333;
            --active-bg: #4f5b7d; /* 選択時の青みがかったグレー */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
            --risk-color: #ef4444;
            --success-color: #22c55e;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            padding-bottom: 100px;
            -webkit-user-select: none; user-select: none;
        }

        /* スプラッシュ画面 */
        #splash {
            position: fixed; inset: 0;
            background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }

        /* スクリーン切り替え */
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* カードとセクション定義 */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            margin: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px; font-weight: bold;
            margin-bottom: 15px;
        }

        .item-group { margin-bottom: 15px; }
        .item-label {
            color: var(--text-muted); font-size: 12px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 5px;
        }
        .info-icon {
            color: #38bdf8; font-size: 12px; margin-left: 5px;
        }

        /* セグメントコントロール（数字ボタン） */
        .segment-control {
            display: flex;
            background-color: var(--primary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .segment-btn {
            flex: 1;
            padding: 10px 0;
            background: none; border: none;
            color: var(--text-color); font-weight: bold; font-size: 14px;
            text-align: center; cursor: pointer;
            transition: 0.1s;
            border-right: 1px solid var(--border-color);
        }
        .segment-btn:last-child { border-right: none; }
        .segment-btn.active {
            background-color: var(--active-bg);
        }

        /* スイッチスイッチ */
        .switch {
            position: relative; display: inline-block;
            width: 40px; height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--primary);
            transition: .4s; border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px;
            left: 1px; bottom: 1px;
            background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--active-bg); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 入力エリア */
        input.text-input, select.brand-select {
            background-color: var(--primary);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px; border-radius: 8px;
            width: calc(100% - 26px);
            font-size: 14px; margin-bottom: 10px;
        }

        /* 施術プラン出力 */
        #plan-output { margin-top: 15px; }
        .mix-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; }
        .risk-box { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--risk-color); color: #fca5a5; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 12px; }

        /* タブバー */
        .tabbar {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around;
            background-color: var(--card-bg);
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .tab-btn { background: none; color: #94a3b8; border: none; font-size: 12px; }
        .tab-btn.active { color: #38bdf8; font-weight: bold; }

        /* カメラ周り */
        #video { width: 100%; border-radius: 8px; background: #000; display: none; margin-bottom: 10px;}
        #photo-preview img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--active-bg); }

    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffffff; margin-bottom:5px; font-size:24px;">縮毛矯正ナビAI</h1>
    <p style="color:#64748b; font-size:12px;">Expert Pro Edition</p>
</div>

<div id="app">

    <div id="screen-diagnosis" class="screen active">
        <div class="card">
            <input id="cust-name" class="text-input" placeholder="お客様名（任意）">
            <select id="brand-select" class="brand-select" onchange="state.brand = this.value">
                <option value="milbon">ミルボン (ネオリシオ)</option>
                <option value="arimino">アリミノ (クオライン)</option>
                <option value="custom">標準カスタム比率</option>
            </select>
        </div>

        <div class="card">
            <div class="section-title">本来の毛髪強度</div>

            <div class="item-group">
                <div class="item-label">髪の太さ (1~10) <span class="info-icon">i</span></div>
                <div class="segment-control" id="thick-ctrl">
                    <button class="segment-btn" onclick="updateSegment('thick', 2, this)">2</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 4, this)">4</button>
                    <button class="segment-btn active" onclick="updateSegment('thick', 6, this)">6</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 8, this)">8</button>
                    <button class="segment-btn" onclick="updateSegment('thick', 10, this)">10</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">弾力 (0~5) <span class="info-icon">i</span></div>
                <div class="segment-control" id="elastic-ctrl">
                    <button class="segment-btn" onclick="updateSegment('elastic', 1, this)">1</button>
                    <button class="segment-btn active" onclick="updateSegment('elastic', 3, this)">3</button>
                    <button class="segment-btn" onclick="updateSegment('elastic', 5, this)">5</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">疎水性 (0~5) <span class="info-icon">i</span></div>
                <div class="segment-control" id="porous-ctrl">
                    <button class="segment-btn active" onclick="updateSegment('porous', 1, this)">1</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 3, this)">3</button>
                    <button class="segment-btn" onclick="updateSegment('porous', 5, this)">5</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div class="section-title" style="margin:0;">根元</div>
                <div style="font-size:12px; color:var(--text-muted);">
                    リタッチのみ 
                    <label class="switch">
                        <input type="checkbox" id="retouch-switch" onchange="state.root.isRetouch = this.checked">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">カラーのダメージ (0~20) <span class="info-icon">i</span></div>
                <div class="segment-control" id="root-color-ctrl">
                    <button class="segment-btn active" onclick="updateSegment('rootColor', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 5, this)">5</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('rootColor', 15, this)">15</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">矯正のダメージ (0~20) <span class="info-icon">i</span></div>
                <div class="segment-control" id="root-perm-ctrl">
                    <button class="segment-btn active" onclick="updateSegment('rootPerm', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('rootPerm', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('rootPerm', 20, this)">20</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">毛先</div>

            <div class="item-group">
                <div class="item-label">カラーのダメージ (0~20)</div>
                <div class="segment-control" id="tip-color-ctrl">
                    <button class="segment-btn active" onclick="updateSegment('tipColor', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 5, this)">5</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('tipColor', 15, this)">15</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label">矯正のダメージ (0~20)</div>
                <div class="segment-control" id="tip-perm-ctrl">
                    <button class="segment-btn active" onclick="updateSegment('tipPerm', 0, this)">0</button>
                    <button class="segment-btn" onclick="updateSegment('tipPerm', 10, this)">10</button>
                    <button class="segment-btn" onclick="updateSegment('tipPerm', 20, this)">20</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">AI 画像接写診断</div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="photo-preview"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleCamera()" style="flex:1; background-color:var(--primary);">カメラ起動</button>
                <button onclick="takePhoto()" style="flex:1; background-color:var(--active-bg);">写真を保存</button>
            </div>
        </div>

        <button class="auto-btn" style="background-color:var(--active-bg); color:white; width:calc(100% - 20px); margin:10px; padding:15px; border-radius:8px; font-weight:bold; font-size:16px;" onclick="generatePlan()">計算する</button>

        <div id="plan-output"></div>

    </div>

    <div id="screen-record" class="screen">
        <div class="card">
            <div class="section-title">カルテ</div>
            <p style="color:var(--text-muted)">※過去の診断履歴がここに表示されます。</p>
        </div>
    </div>

    <div class="tabbar">
        <button class="tab-btn active" onclick="switchTab('diagnosis', this)">診断</button>
        <button class="tab-btn" onclick="switchTab('record', this)">カルテ</button>
    </div>

</div>

<script>
// --- 状態管理 ---
let state = {
    thick: 6,
    elastic: 3,
    porous: 1,
    brand: 'milbon',
    capturedPhoto: null,
    root: { color: 0, perm: 0, isRetouch: false },
    tip: { color: 0, perm: 0 },
};

// 薬剤プリセット (1剤:水:油)
const brandPresets = {
    milbon:  { AX:[90,5,5], SH:[80,10,10], H:[70,20,10], M:[50,40,10], L:[30,60,10], B:[10,80,10] },
    arimino: { AX:[100,0,0], SH:[85,10,5],  H:[70,20,10], M:[50,40,10], L:[25,65,10], B:[5,85,10] },
    custom:  { AX:[80,10,10], SH:[70,15,15], H:[60,20,20], M:[50,30,20], L:[40,40,20], B:[30,50,20] }
};

// --- UI操作関数 ---
function updateSegment(key, val, el) {
    // ボタンの見た目を更新
    el.parentNode.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    
    // 状態を更新
    if (key.startsWith('root')) {
        state.root[key.replace('root', '').toLowerCase()] = val;
    } else if (key.startsWith('tip')) {
        state.tip[key.replace('tip', '').toLowerCase()] = val;
    } else {
        state[key] = val;
    }
}

function calculatePlanFor(sectionState) {
    // 骨組みの計算ロジックを反映
    const baseScore = state.thick + state.elastic + state.porous;
    const finalScore = baseScore - (sectionState.color + sectionState.perm);

    let lv = 'B';
    if(finalScore >= 18) lv = 'AX';
    else if(finalScore >= 15) lv = 'SH';
    else if(finalScore >= 12) lv = 'H';
    else if(finalScore >= 9)  lv = 'M';
    else if(finalScore >= 6)  lv = 'L';

    const formula = brandPresets[state.brand][lv];
    const total = 60; // 根元・毛先それぞれ60g計算
    return {
        lv, score: finalScore,
        m: Math.round(total * formula[0]/100),
        w: Math.round(total * formula[1]/100),
        o: Math.round(total * formula[2]/100),
        formula
    };
}

function generatePlan() {
    const rootPlan = calculatePlanFor(state.root);
    const tipPlan = state.root.isRetouch ? null : calculatePlanFor(state.tip);

    let outputHtml = `
        <div class="card" style="border-left: 5px solid var(--success-color);">
            <div class="section-title">施術プラン：根元 (${rootPlan.lv})</div>
            <div class="mix-grid">
                <div>1剤<br><strong>${rootPlan.m}g</strong></div>
                <div>減力水<br><strong>${rootPlan.w}g</strong></div>
                <div>保護油<br><strong>${rootPlan.o}g</strong></div>
            </div>
            <div style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:5px;">比率 ${rootPlan.formula.join(':')}</div>
        </div>
    `;

    if (tipPlan) {
        outputHtml += `
            <div class="card" style="border-left: 5px solid #fbbf24;">
                <div class="section-title">施術プラン：毛先 (${tipPlan.lv})</div>
                <div class="mix-grid">
                    <div>1剤<br><strong>${tipPlan.m}g</strong></div>
                    <div>減力水<br><strong>${tipPlan.w}g</strong></div>
                    <div>保護油<br><strong>${tipPlan.o}g</strong></div>
                </div>
                <div style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:5px;">比率 ${tipPlan.formula.join(':')}</div>
            </div>
        `;
    }

    // 簡易的なリスク表示
    let risks = [];
    if (state.tip.perm >= 20) risks.push("⚠️ 毛先の既往ダメージが深刻です。酸性域でのアプローチを推奨。");
    if (risks.length) outputHtml += `<div class="card risk-box">${risks.join('<br>')}</div>`;

    document.getElementById('plan-output').innerHTML = outputHtml;
}

// --- カメラ機能 (簡易実装) ---
let stream = null;
async function toggleCamera() {
    const video = document.getElementById('video');
    if (!stream) {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream; video.style.display = 'block';
    } else {
        stream.getTracks().forEach(track => track.stop());
        stream = null; video.style.display = 'none';
    }
}
function takePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    state.capturedPhoto = canvas.toDataURL('image/png');
    document.getElementById('photo-preview').innerHTML = `<img src="${state.capturedPhoto}">`;
}

// ユーティリティ
function switchTab(screenId, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screenId).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
setTimeout(() => document.getElementById('splash').style.display='none', 1000);
</script>

</body>
</html>
