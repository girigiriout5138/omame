<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>縮毛矯正AI</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif}
.card{background:#111;margin:10px;padding:10px;border-radius:10px}
button{margin:5px;padding:10px}
</style>
</head>
<body>

<input id="name" placeholder="名前">

<div class="card">
太さ <span id="val-thick">5</span><br>
<button onclick="setVal('thick',5)">5</button>
<button onclick="setVal('thick',8)">8</button>
</div>

<div class="card">
カラー <span id="val-color">0</span><br>
<button onclick="setVal('color',0)">0</button>
<button onclick="setVal('color',10)">10</button>
</div>

<div class="card">
縮毛 <span id="val-perm">0</span><br>
<button onclick="setVal('perm',0)">0</button>
<button onclick="setVal('perm',20)">20</button>
</div>

<button onclick="calc()">計算</button>

<div id="out"></div>

<script>
let state={
thick:5,
color:0,
perm:0
};

function setVal(key,val){
state[key]=val;

let el=document.getElementById("val-"+key);
if(el) el.innerText=val;
}

function calc(){
let score=(state.thick*1.2)-(state.color*0.8)-(state.perm*1.2);

let lv="B";
if(score>10) lv="H";

let html=`
<div class="card">
結果：${lv}
</div>
`;

document.getElementById("out").innerHTML=html;
}
</script>

</body>
</html>
