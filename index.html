<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Expert Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --btn-default: #2a2a2e;
            --btn-active: #4f5b7d;
            --text-color: #ffffff;
            --accent: #38bdf8;
            --border: #222222;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            color: var(--text-color); font-family: -apple-system, sans-serif;
            padding-bottom: 80px; -webkit-user-select: none;
        }

        .card {
            background: var(--card-bg); border-radius: 15px;
            margin: 10px; padding: 15px; border: 1px solid var(--border);
        }

        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }

        /* 数字ボタンの並び（折り返し対応） */
        .btn-group {
            display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px;
        }
        .num-btn {
            flex: 0 0 calc(20% - 4px); /* 1行に5つ並べる */
            padding: 12px 0; background: var(--btn-default);
            border: none; border-radius: 8px; color: white;
            font-weight: bold; font-size: 14px; cursor: pointer;
        }
        .num-btn.active { background: var(--btn-active); }

        .label-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: 14px;
        }
        .info-icon { color: var(--accent); font-style: normal; font-size: 12px; }

        /* 毛量・リッジのスタイル */
        .flex-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .chip-btn {
            padding: 8px 12px; border-radius: 20px; background: var(--btn-default);
            border: 1px solid var(--border); color: white; font-size: 13px;
        }
        .chip-btn.active { background: var(--btn-active); }

        .radio-group { display: flex; gap: 10px; margin-bottom: 15px; font-size: 13px; }

        /* 入力・ボタン */
        .input-field {
            width: calc(100% - 20px); padding: 12px; margin: 10px;
            background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 8px; color: white;
        }
        .calc-btn {
            width: calc(100% - 20px); margin: 10px; padding: 15px;
            background: var(--btn-active); border: none; border-radius: 10px;
            color: white; font-weight: bold; font-size: 16px;
        }

        /* 結果表示 */
        #result { margin: 10px; }
        .mix-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--accent); }

        /* カメラ */
        #video { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
        #preview img { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<input type="text" class="input-field" placeholder="お客様名（任意）">

<div class="card">
    <div class="section-title">本来の毛髪強度</div>
    
    <div class="label-row">髪の太さ (1〜10) <i class="info-icon">i</i></div>
    <div class="btn-group" id="thick-group">
        <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==5?'active':''}" onclick="sel('thick',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">弾力 (0〜5) <i class="info-icon">i</i></div>
    <div class="btn-group" id="elastic-group">
        <script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="sel('elastic',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">疎水性 (0〜5) <i class="info-icon">i</i></div>
    <div class="btn-group" id="porous-group">
        <script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="sel('porous',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">毛量</div>
    <div class="flex-row">
        <button class="chip-btn" onclick="selChip('vol',0.5,this)">超少ない</button>
        <button class="chip-btn" onclick="selChip('vol',0.8,this)">少ない</button>
        <button class="chip-btn active" onclick="selChip('vol',1.0,this)">普通</button>
        <button class="chip-btn" onclick="selChip('vol',1.3,this)">多い</button>
    </div>
</div>

<div class="card">
    <div class="section-title">根元</div>
    <div class="label-row">カラーのダメージ (0〜20)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('rColor',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">矯正のダメージ (0〜20)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('rPerm',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">不安要素 (0〜10)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=10; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('rUnrest',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">根元のリッジ</div>
    <div class="radio-group">
        <label><input type="radio" name="rR" value="弱い"> 弱い</label>
        <label><input type="radio" name="rR" value="普通" checked> 普通</label>
        <label><input type="radio" name="rR" value="強い"> 強い</label>
        <label><input type="radio" name="rR" value="難しい"> 難しい</label>
    </div>
</div>

<div class="card">
    <div class="section-title">毛先</div>
    <div class="label-row">カラーのダメージ (0〜20)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('tColor',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">矯正のダメージ (0〜20)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('tPerm',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">不安要素 (0〜10)</div>
    <div class="btn-group">
        <script>for(let i=0; i<=10; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="sel('tUnrest',${i},this)">${i}</button>`)</script>
    </div>
</div>

<div class="card">
    <div class="section-title">AI画像接写診断</div>
    <div style="display:flex; gap:10px;">
        <button class="num-btn" style="flex:1" onclick="startCam()">カメラ起動</button>
        <button class="num-btn" style="flex:1" onclick="shutter()">写真を保存</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <div id="preview"></div>
</div>

<button class="calc-btn" onclick="calc()">計算する</button>

<div id="result"></div>

<script>
    let state = { thick:5, elastic:3, porous:3, vol:1.0, rColor:0, rPerm:0, rUnrest:0, tColor:0, tPerm:0, tUnrest:0 };

    function sel(key, val, el) {
        el.parentNode.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        state[key] = val;
    }

    function selChip(key, val, el) {
        el.parentNode.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        state[key] = val;
    }

    function calc() {
        // 簡易ロジック
        let rScore = (state.thick + state.elastic) - (state.rColor + state.rPerm + state.rUnrest);
        let drug = rScore > 5 ? "H (ハード)" : "M (ミディアム)";
        
        document.getElementById('result').innerHTML = `
            <div class="mix-box">
                <strong>診断結果</strong><br>
                根元推奨: ${drug}<br>
                総量目安: ${Math.round(80 * state.vol)}g
            </div>
        `;
    }

    async function startCam() {
        const v = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        v.srcObject = stream; v.style.display = 'block';
    }

    function shutter() {
        const v = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        document.getElementById('preview').innerHTML = `<img src="${canvas.toDataURL()}">`;
    }
</script>
</body>
</html>
