<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Pro</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --btn-default: #333333;
            --btn-active: #4a5568;
            --accent: #38bdf8;
            --pink-badge: #f687b3;
            --text-main: #ffffff;
            --text-sub: #a0aec0;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            color: var(--text-main); font-family: -apple-system, sans-serif;
            padding: 15px; padding-bottom: 50px;
        }

        .card {
            background: var(--card-bg); border-radius: 12px;
            padding: 15px; margin-bottom: 15px;
        }

        .section-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: var(--accent); }

        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .val-display { color: var(--accent); font-weight: bold; }

        /* 数字選択ボタン */
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .num-btn {
            background: var(--btn-default); border: none; border-radius: 6px;
            color: white; padding: 10px 0; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .num-btn.active { background: var(--btn-active); box-shadow: 0 0 0 2px var(--accent); }

        /* 結果テーブル */
        .res-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .res-table td { padding: 12px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .res-label { color: var(--text-sub); }
        .res-val { text-align: right; font-weight: bold; }

        .badge-alkali {
            background: var(--pink-badge); color: white; padding: 2px 8px;
            border-radius: 6px; font-size: 12px; margin-left: 8px; display: inline-block;
        }

        .calc-btn {
            width: 100%; padding: 16px; background: var(--accent);
            border: none; border-radius: 10px; color: black; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

<div style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">診断入力</div>

<div class="card">
    <div class="section-title">本来の毛髪強度</div>
    <div class="label-row">髪の太さ (1-10) <span class="val-display" id="v-thick">5</span></div>
    <div class="btn-grid">
        <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn ${i==5?'active':''}" onclick="setV('thick',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">弾力 (0-5) <span class="val-display" id="v-elastic">3</span></div>
    <div class="btn-grid">
        <script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="setV('elastic',${i},this)">${i}</button>`)</script>
    </div>

    <div class="label-row">疎水性 (0-5) <span class="val-display" id="v-porous">3</span></div>
    <div class="btn-grid">
        <script>for(let i=0; i<=5; i++) document.write(`<button class="num-btn ${i==3?'active':''}" onclick="setV('porous',${i},this)">${i}</button>`)</script>
    </div>
</div>

<div class="card">
    <div class="section-title">ダメージ状況</div>
    <div class="label-row">カラー履歴 (0-20) <span class="val-display" id="v-rColor">0</span></div>
    <div class="btn-grid">
        <script>for(let i=0; i<=20; i++) document.write(`<button class="num-btn ${i==0?'active':''}" onclick="setV('rColor',${i},this)">${i}</button>`)</script>
    </div>
</div>

<button class="calc-btn" onclick="runCalc()">計算する</button>

<div id="res-area" style="display:none; margin-top: 20px;">
    <div class="card">
        <div class="section-title">計算結果</div>
        <table class="res-table">
            <tr>
                <td class="res-label">本来の毛髪強度</td>
                <td class="res-val" id="out-base">太5、弾3、疎3 <span class="val-display" style="margin-left:10px;">11</span></td>
            </tr>
            <tr>
                <td class="res-label">根元の毛髪強度</td>
                <td class="res-val" id="out-root">カ0 <span class="val-display" style="margin-left:10px;">11</span></td>
            </tr>
            <tr>
                <td class="res-label">推奨薬剤</td>
                <td class="res-val"><span id="out-drug">AX7 : BX3</span><span class="badge-alkali" id="out-h">H10%</span></td>
            </tr>
            <tr>
                <td class="res-label">アイロン目安</td>
                <td class="res-val" id="out-iron">0.50秒〜1.00秒</td>
            </tr>
            <tr>
                <td class="res-label">スライス目安</td>
                <td class="res-val" id="out-slice">7mm</td>
            </tr>
        </table>
    </div>
</div>

<script>
    let data = { thick: 5, elastic: 3, porous: 3, rColor: 0 };

    function setV(k, v, el) {
        el.parentNode.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        data[k] = v;
        document.getElementById('v-' + k).innerText = v;
    }

    function runCalc() {
        const base = data.thick + data.elastic + data.porous;
        const root = base - data.rColor;

        document.getElementById('out-base').innerHTML = `太${data.thick}、弾${data.elastic}、疎${data.porous} <span class="val-display" style="margin-left:10px;">${base}</span>`;
        document.getElementById('out-root').innerHTML = `カ${data.rColor} <span class="val-display" style="margin-left:10px;">${root}</span>`;

        let drug, h, iron, slice;
        if (root >= 11) {
            drug = "AX7 : BX3"; h = "H10%"; iron = "0.50秒〜1.00秒"; slice = "7mm";
        } else if (root >= 8) {
            drug = "AX5 : BX5"; h = "H5%"; iron = "0.80秒〜1.20秒"; slice = "5mm";
        } else {
            drug = "AX2 : BX8"; h = "L3%"; iron = "1.00秒〜1.50秒"; slice = "3mm";
        }

        document.getElementById('out-drug').innerText = drug;
        document.getElementById('out-h').innerText = h;
        document.getElementById('out-iron').innerText = iron;
        document.getElementById('out-slice').innerText = slice;

        document.getElementById('res-area').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
