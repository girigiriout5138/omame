<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮毛矯正ナビAI - Pro</title>

    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --primary-btn: #2a2a2e; /* 通常のボタン色 */
            --active-bg: #4f5b7d;  /* 選択時の青みがかったグレー */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #222222;
            --accent-blue: #38bdf8;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            padding-bottom: 80px; /* タブバー用 */
            -webkit-user-select: none; user-select: none;
        }

        /* 共通スタイル */
        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            margin: 10px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 16px; font-weight: bold;
            margin-bottom: 15px;
        }

        .item-group { margin-bottom: 18px; }
        .item-label-row {
            color: var(--text-color); font-size: 14px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-icon {
            color: #38bdf8; font-size: 14px; margin-left: 5px; cursor: pointer;
        }
        .current-val { color: var(--text-muted); font-size: 14px; }

        /* セグメントコントロール（連続した数字ボタン） */
        .segment-control {
            display: flex;
            background-color: var(--primary-btn);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .segment-btn {
            flex: 1;
            padding: 12px 0;
            background: none; border: none;
            color: var(--text-color); font-weight: bold; font-size: 16px;
            text-align: center; cursor: pointer;
            border-right: 1px solid var(--border-color);
        }
        .segment-btn:last-child { border-right: none; }
        .segment-btn.active {
            background-color: var(--active-bg);
        }

        /* ラジオボタン（リッジ用） */
        .radio-group {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .radio-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 14px; color: var(--text-color);
        }
        .radio-label input[type="radio"] {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 2px solid var(--text-muted); border-radius: 50%;
            background: none; margin: 0;
        }
        .radio-label input[type="radio"]:checked {
            border-color: var(--text-color);
            background-color: var(--text-color);
            box-shadow: inset 0 0 0 3px var(--card-bg);
        }

        /* 毛量用ボタン */
        .vol-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .vol-btn {
            padding: 8px 12px; border-radius: 20px;
            background-color: var(--primary-btn); color: var(--text-color);
            border: 1px solid var(--border-color); font-size: 13px;
        }
        .vol-btn.active { background-color: var(--active-bg); }

        /* スイッチ */
        .switch-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-size: 14px;
        }
        .switch {
            position: relative; display: inline-block;
            width: 46px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--primary-btn);
            transition: .4s; border-radius: 26px;
            border: 1px solid var(--border-color);
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--active-bg); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 入力エリア */
        input.text-input, select.brand-select {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px; border-radius: 10px;
            width: calc(100% - 32px);
            font-size: 14px; margin: 10px;
        }

        /* アクションボタン */
        .action-btn-row { display: flex; gap: 10px; margin: 10px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 10px;
            border: none; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* 計算結果出力 */
        .mix-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; margin-top: 10px;}
        .risk-box { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 12px; }

        /* タブバー */
        .tabbar {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around;
            background-color: #050505;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        .tab-btn { background: none; color: #aaaaaa; border: none; font-size: 14px; }
        .tab-btn.active { color: #38bdf8; font-weight: bold; }

        /* カメラ */
        #video { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px;}
        #photo-preview img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--active-bg); }
        
        /* スプラッシュ */
        #splash {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#fff; font-size:24px;">縮毛矯正ナビAI</h1>
    <p style="color:#64748b; font-size:12px;">Pro Edition</p>
</div>

<div id="app">
    <div id="screen-diagnosis" class="screen active">
        <input id="cust-name" class="text-input" placeholder="お客様名（任意）">
        
        <select id="brand-select" class="brand-select" onchange="state.brand = this.value">
            <option value="milbon">ミルボン (ネオリシオ)</option>
            <option value="arimino">アリミノ (クオライン)</option>
            <option value="custom">標準カスタム比率</option>
        </select>

        <div class="card">
            <div class="section-title">本来の毛髪強度</div>

            <div class="item-group">
                <div class="item-label-row">髪の太さ (1~10) <span class="info-icon">i</span> <span class="current-val" id="val-thick">5</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="upd('thick',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('thick',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('thick',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('thick',4,this)">4</button>
                    <button class="segment-btn active" onclick="upd('thick',5,this)">5</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">弾力 (0~5) <span class="info-icon">i</span> <span class="current-val" id="val-elastic">3</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="upd('elastic',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('elastic',2,this)">2</button>
                    <button class="segment-btn active" onclick="upd('elastic',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('elastic',4,this)">4</button>
                    <button class="segment-btn" onclick="upd('elastic',5,this)">5</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">疎水性 (0~5) <span class="info-icon">i</span> <span class="current-val" id="val-porous">3</span></div>
                <div class="segment-control">
                    <button class="segment-btn" onclick="upd('porous',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('porous',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('porous',2,this)">2</button>
                    <button class="segment-btn active" onclick="upd('porous',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('porous',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">毛量 <span class="current-val" id="val-volume">普通</span></div>
                <div class="vol-group">
                    <button class="vol-btn" onclick="updVol('超少ない',0.5,this)">超少ない</button>
                    <button class="vol-btn" onclick="updVol('少ない',0.8,this)">少ない</button>
                    <button class="vol-btn active" onclick="updVol('普通',1.0,this)">普通</button>
                    <button class="vol-btn" onclick="updVol('多い',1.3,this)">多い</button>
                </div>
            </div>

            <div class="switch-row">
                <span>黒人毛 (+10)</span>
                <label class="switch">
                    <input type="checkbox" onchange="state.isBlack = this.checked">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <div class="switch-row">
                <div class="section-title" style="margin:0;">根元</div>
                <div style="font-size:12px; color:var(--text-muted);">
                    リタッチのみ 
                    <label class="switch">
                        <input type="checkbox" onchange="state.root.isRetouch = this.checked">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">カラーのダメージ (0~20) <span class="info-icon">i</span> <span class="current-val" id="val-rootColor">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('rootColor',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('rootColor',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('rootColor',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('rootColor',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('rootColor',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">矯正のダメージ (0~20) <span class="info-icon">i</span> <span class="current-val" id="val-rootPerm">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('rootPerm',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('rootPerm',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('rootPerm',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('rootPerm',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('rootPerm',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">不安要素 (0~10) <span class="info-icon">i</span> <span class="current-val" id="val-rootUnrest">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('rootUnrest',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('rootUnrest',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('rootUnrest',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('rootUnrest',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('rootUnrest',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">根元のリッジ</div>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="rootRidge" value="弱い" onchange="state.root.ridge=this.value">弱い</label>
                    <label class="radio-label"><input type="radio" name="rootRidge" value="普通" checked onchange="state.root.ridge=this.value">普通</label>
                    <label class="radio-label"><input type="radio" name="rootRidge" value="強い" onchange="state.root.ridge=this.value">強い</label>
                    <label class="radio-label"><input type="radio" name="rootRidge" value="難しい" onchange="state.root.ridge=this.value">難しい</label>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">毛先</div>

            <div class="item-group">
                <div class="item-label-row">カラーのダメージ (0~20) <span class="info-icon">i</span> <span class="current-val" id="val-tipColor">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('tipColor',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('tipColor',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('tipColor',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('tipColor',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('tipColor',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">矯正のダメージ (0~20) <span class="info-icon">i</span> <span class="current-val" id="val-tipPerm">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('tipPerm',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('tipPerm',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('tipPerm',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('tipPerm',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('tipPerm',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">不安要素 (0~10) <span class="info-icon">i</span> <span class="current-val" id="val-tipUnrest">0</span></div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="upd('tipUnrest',0,this)">0</button>
                    <button class="segment-btn" onclick="upd('tipUnrest',1,this)">1</button>
                    <button class="segment-btn" onclick="upd('tipUnrest',2,this)">2</button>
                    <button class="segment-btn" onclick="upd('tipUnrest',3,this)">3</button>
                    <button class="segment-btn" onclick="upd('tipUnrest',4,this)">4</button>
                </div>
            </div>

            <div class="item-group">
                <div class="item-label-row">毛先のリッジ</div>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="tipRidge" value="弱い" onchange="state.tip.ridge=this.value">弱い</label>
                    <label class="radio-label"><input type="radio" name="tipRidge" value="普通" checked onchange="state.tip.ridge=this.value">普通</label>
                    <label class="radio-label"><input type="radio" name="tipRidge" value="強い" onchange="state.tip.ridge=this.value">強い</label>
                    <label class="radio-label"><input type="radio" name="tipRidge" value="難しい" onchange="state.tip.ridge=this.value">難しい</label>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">AI 画像接写診断</div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="photo-preview"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="toggleCamera()" style="flex:1; background-color:var(--primary-btn); color:white; border:none; padding:10px; border-radius:8px;">カメラ起動</button>
                <button onclick="takePhoto()" style="flex:1; background-color:var(--active-bg); color:white; border:none; padding:10px; border-radius:8px;">写真を保存</button>
            </div>
        </div>

        <div class="action-btn-row">
            <button class="action-btn" style="background-color:var(--active-bg); color:white;" onclick="generatePlan()">計算する</button>
            <button class="action-btn" style="background-color:var(--primary-btn); color:var(--text-muted);" oncontextmenu="resetAll(); return false;" onclick="alert('長押しでリセットされます')">↺ リセット</button>
        </div>

        <div id="plan-output"></div>
    </div>

    <div id="screen-record" class="screen">
        <div class="card"><div class="section-title">カルテ履歴</div><p style="color:var(--text-muted)">履歴はありません</p></div>
    </div>

    <div class="tabbar">
        <button class="tab-btn active" onclick="switchTab('diagnosis', this)">診断</button>
        <button class="tab-btn" onclick="switchTab('record', this)">カルテ</button>
    </div>
</div>

<script>
// --- 状態管理 ---
let state = {
    thick: 5, elastic: 3, porous: 3, volMult: 1.0, isBlack: false, brand: 'milbon',
    root: { color: 0, perm: 0, unrest: 0, ridge: '普通', isRetouch: false },
    tip: { color: 0, perm: 0, unrest: 0, ridge: '普通' },
};

// 薬剤プリセット (1剤:水:油)
const brandPresets = {
    milbon:  { AX:[90,5,5], SH:[80,10,10], H:[70,20,10], M:[50,40,10], L:[30,60,10], B:[10,80,10] },
    arimino: { AX:[100,0,0], SH:[85,10,5],  H:[70,20,10], M:[50,40,10], L:[25,65,10], B:[5,85,10] },
    custom:  { AX:[80,10,10], SH:[70,15,15], H:[60,20,20], M:[50,30,20], L:[40,40,20], B:[30,50,20] }
};

// --- UI操作 ---
function upd(key, val, el) {
    el.parentNode.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('val-'+key).innerText = val;
    if (key.startsWith('root')) state.root[key.replace('root', '').toLowerCase()] = val;
    else if (key.startsWith('tip')) state.tip[key.replace('tip', '').toLowerCase()] = val;
    else state[key] = val;
}

function updVol(name, mult, el) {
    el.parentNode.querySelectorAll('.vol-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('val-volume').innerText = name;
    state.volMult = mult;
}

function resetAll() { location.reload(); }

function switchTab(sId, b) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-'+sId).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
    b.classList.add('active');
}

// --- 計算ロジック ---
function calculatePlanFor(sec) {
    let score = state.thick + state.elastic + state.porous;
    if (state.isBlack) score += 10;
    // リッジによる調整
    if (sec.ridge === '強い') score += 2;
    if (sec.ridge === '難しい') score += 4;
    
    // ダメージ・不安要素による減点
    score -= (sec.color + sec.perm + sec.unrest);

    let lv = 'B';
    if(score >= 22) lv = 'AX';
    else if(score >= 18) lv = 'SH';
    else if(score >= 14) lv = 'H';
    else if(score >= 10) lv = 'M';
    else if(score >= 6)  lv = 'L';

    const formula = brandPresets[state.brand][lv];
    const baseTotal = 80; // 基本グラム数
    const total = Math.round(baseTotal * state.volMult); // 毛量で調整
    
    return { lv, total, m: Math.round(total * formula[0]/100), w: Math.round(total * formula[1]/100), o: Math.round(total * formula[2]/100) };
}

function generatePlan() {
    const rP = calculatePlanFor(state.root);
    const tP = state.root.isRetouch ? null : calculatePlanFor(state.tip);
    const name = document.getElementById('cust-name').value || '未設定';

    let h = `<div class="card"><div class="section-title">${name} 様 推奨配合</div>`;
    h += `<strong>根元 (${rP.lv})</strong> - 総量${rP.total}g<div class="mix-grid"><div>1剤<br><strong>${rP.m}g</strong></div><div>水<br><strong>${rP.w}g</strong></div><div>油<br><strong>${rP.o}g</strong></div></div>`;
    
    if (tP) {
        h += `<hr style="border:0; border-top:1px solid #222; margin:15px 0;">`;
        h += `<strong>毛先 (${tP.lv})</strong> - 総量${tP.total}g<div class="mix-grid"><div>1剤<br><strong>${tP.m}g</strong></div><div>水<br><strong>${tP.w}g</strong></div><div>油<br><strong>${tP.o}g</strong></div></div>`;
    }
    
    if (state.root.unrest > 3 || state.tip.unrest > 3) {
        h += `<div class="risk-box">⚠️ 不安要素が高いため、1ランク弱い薬剤からテスト、または前処理を徹底してください。</div>`;
    }
    h += `</div>`;
    document.getElementById('plan-output').innerHTML = h;
    window.scrollTo(0, document.body.scrollHeight); // 一番下へスクロール
}

// --- カメラ ---
let stream = null;
async function toggleCamera() {
    const v = document.getElementById('video');
    if (!stream) {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = stream; v.style.display = 'block';
    } else {
        stream.getTracks().forEach(t => t.stop());
        stream = null; v.style.display = 'none';
    }
}
function takePhoto() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    document.getElementById('photo-preview').innerHTML = `<img src="${c.toDataURL('image/png')}">`;
}

// スプラッシュ消去
setTimeout(() => document.getElementById('splash').style.display='none', 1500);
</script>

</body>
</html>
